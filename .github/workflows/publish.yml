name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @fps-games/editor
    runs-on: ubuntu-latest
    environment:
      name: ${{ format('npm-{0}', contains(github.ref_name, '-beta.') && 'beta' || 'stable') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Resolve release channel
        id: release
        shell: bash
        run: |
          tag="$GITHUB_REF_NAME"
          version="${tag#v}"

          if [[ "$tag" != v* ]]; then
            echo "Publish Package only supports v* tags, got: $tag" >&2
            exit 1
          fi

          if [[ "$tag" == *"-beta."* ]]; then
            channel="beta"
            npm_tag="beta"
            prerelease="true"
          else
            channel="stable"
            npm_tag="latest"
            prerelease="false"
          fi

          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$npm_tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Check release metadata
        run: npm run "release:check:${{ steps.release.outputs.channel }}" -- --tag "${{ steps.release.outputs.tag }}"

      - name: Check package boundaries, types, and unit tests
        run: npm run check

      - name: Build packages
        run: npm run build

      - name: Build editor lab
        run: npm run build:editor-lab

      - name: Browser smoke
        run: npm run test:browser

      - name: Packed consumer smoke
        run: npm run test:pack

      - name: Tarball dry run
        run: npm run pack:dry-run

      - name: Publish to npm
        env:
          NPM_CONFIG_PROVENANCE: true
          NPM_TAG: ${{ steps.release.outputs.npm_tag }}
        run: npm publish --workspace @fps-games/editor --access public --tag "$NPM_TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          NPM_TAG: ${{ steps.release.outputs.npm_tag }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          ## npm

          \`\`\`bash
          npm install @fps-games/editor@$RELEASE_VERSION
          \`\`\`

          - npm dist-tag: \`$NPM_TAG\`
          - Package: \`@fps-games/editor@$RELEASE_VERSION\`

          ## Verification

          This release was published by the tag-driven \`Publish Package\` workflow after:

          - release metadata check
          - package boundary check, typecheck, and unit tests
          - package build
          - editor-lab build
          - browser smoke
          - packed consumer smoke
          - tarball dry run
          EOF

          release_flags=(--verify-tag --title "$RELEASE_TAG" --notes-file release-notes.md)
          if [[ "$PRERELEASE" == "true" ]]; then
            release_flags+=(--prerelease)
          fi

          gh release create "$RELEASE_TAG" "${release_flags[@]}"
